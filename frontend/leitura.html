<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Leitura | Kairos MA-thos</title>

  <link rel="stylesheet" href="css/style.css" />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>

<body class="app-bg">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-symbol">K</div>
      <div>
        <h1>Kairos MA-thos</h1>
        <p>Leitura inteligente</p>
      </div>
    </div>

    <nav class="menu">
      <a href="index.html">Início</a>
      <a href="upload.html">Analisar documento</a>
      <a href="chat.html">Chat com documento</a>
      <a href="historico.html">Histórico</a>
      <a href="leitura.html" class="active">Leitura completa</a>
    </nav>

    <div class="sidebar-footer">
      <p>Resultado completo da análise feita pela inteligência artificial.</p>
    </div>
  </aside>

  <main class="content">
    <header class="topbar">
      <div>
        <span class="eyebrow">Leitura completa</span>
        <h2>Resultado da análise</h2>
      </div>

      <a href="upload.html" class="btn-outline-custom">Novo upload</a>
    </header>

    <section class="panel result-panel">
      <div class="panel-header">
        <div>
          <span class="eyebrow">Documento analisado</span>
          <h3 id="nomeArquivo">Arquivo</h3>
        </div>
      </div>

      <div id="conteudoLeitura" class="result-box">
        <p class="empty-state">Nenhuma análise encontrada.</p>
      </div>
    </section>
  </main>

  <script>
    const resposta = localStorage.getItem("ultimaResposta");
    const nome = localStorage.getItem("ultimoArquivo");

    document.getElementById("nomeArquivo").innerText =
      nome || "Nenhum arquivo selecionado";

    document.getElementById("conteudoLeitura").innerHTML =
      resposta
        ? `<p>${resposta}</p>`
        : `<p class="empty-state">Nenhuma análise encontrada.</p>`;
  </script>

</body>
</html>
