<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Histórico | Kairos MA-thos</title>

  <link rel="stylesheet" href="css/style.css" />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>

<body class="app-bg">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-symbol">K</div>
      <div>
        <h1>Kairos MA-thos</h1>
        <p>Leitura inteligente</p>
      </div>
    </div>

    <nav class="menu">
      <a href="index.html">Início</a>
      <a href="upload.html">Analisar documento</a>
      <a href="chat.html">Chat com documento</a>
      <a href="historico.html" class="active">Histórico</a>
      <a href="leitura.html">Leitura completa</a>
    </nav>

    <div class="sidebar-footer">
      <p>Histórico das análises realizadas pelo sistema.</p>
    </div>
  </aside>

  <main class="content">
    <header class="topbar">
      <div>
        <span class="eyebrow">Histórico</span>
        <h2>Análises realizadas</h2>
      </div>

      <a href="upload.html" class="btn-outline-custom">Novo upload</a>
    </header>

    <section id="historico" class="dashboard-grid mt-4"></section>
  </main>

  <script>
    const API_URL = "http://127.0.0.1:8000";

    async function carregarHistorico() {
      const resposta = await fetch(`${API_URL}/historico`);
      const dados = await resposta.json();

      const container = document.getElementById("historico");

      if (dados.length === 0) {
        container.innerHTML = `
          <div class="panel">
            <p class="empty-state">Nenhuma análise realizada ainda.</p>
          </div>
        `;
        return;
      }

      dados.reverse().forEach(item => {
        const card = document.createElement("div");
        card.className = "panel";

        card.innerHTML = `
          <span class="eyebrow">Documento</span>
          <h3>${item.nome}</h3>

          <p style="color:#b8a98d; margin-top:10px;">
            <strong>Análise:</strong> ${item.tipo_analise}
          </p>

          <div style="margin-top:15px; max-height:120px; overflow:hidden;">
            ${item.resposta.substring(0, 200)}...
          </div>

          <button class="btn-main-custom mt-3">
            Abrir leitura
          </button>
        `;

        const botao = card.querySelector("button");

        botao.addEventListener("click", () => {
          localStorage.setItem("ultimaResposta", item.resposta);
          localStorage.setItem("ultimoArquivo", item.nome);
          window.location.href = "leitura.html";
        });

        container.appendChild(card);
      });
    }

    carregarHistorico();
  </script>

</body>
</html>
